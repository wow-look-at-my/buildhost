<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="darkreader-lock">
    <meta name="color-scheme" content="dark">
    <title>Buildhost Admin</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
    <script src="copy.js" defer></script>
</head>
<body>
    <nav class="sidebar" id="sidebar"></nav>
    <main class="content" id="content"></main>
<script>(function(){var q=location.search;if(!q)return;document.addEventListener("click",function(e){var a=e.target.closest("a");if(!a)return;var h=a.getAttribute("href");if(!h||h.startsWith("#")||/^[a-z][a-z0-9+.-]*:/i.test(h))return;try{var u=new URL(h,location.href);if(u.origin!==location.origin)return;if(!u.search)u.search=q;a.href=u.pathname+u.search+u.hash}catch(e){}})})();</script></body>
</html>
