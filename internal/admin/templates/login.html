{{define "login"}}<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Buildhost Admin</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-body">
    <div class="login-card">
        <div class="login-header">
            <div class="logo">B</div>
            <div>
                <div class="sidebar-title">Buildhost</div>
                <div class="sidebar-subtitle">Admin Dashboard</div>
            </div>
        </div>
        {{if .Error}}
        <div class="login-error">{{.Error}}</div>
        {{end}}
        <form method="POST" action="/login">
            <label for="token">API Token</label>
            <input type="password" id="token" name="token" placeholder="bh_..." required autofocus>
            <p class="login-help">Enter a global token with write scope.</p>
            <button type="submit">Sign in</button>
        </form>
    </div>
</body>
</html>{{end}}
