services:
  buildhost:
    build: .
    environment:
      - BUILDHOST_BASE_URL=http://localhost:8080
      - BUILDHOST_DOMAIN=localhost
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "buildhost", "healthcheck"]
      interval: 2s
      timeout: 5s
      start_period: 5s
      retries: 3
