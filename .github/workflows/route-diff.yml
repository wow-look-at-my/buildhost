name: Route Diff

on:
    pull_request:
        types: [opened, reopened, synchronize]

permissions:
    contents: read
    pull-requests: write
    id-token: write

jobs:
    route-diff:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: wow-look-at-my/go-toolchain@v1
              with:
                  generate: 52b76a04057b

            - name: Capture PR routes
              id: routes
              run: echo "routes=$(./build/buildhost_linux_amd64 routes | base64 -w0)" >> "$GITHUB_OUTPUT"

            - name: Diff routes
              uses: wow-look-at-my/actions@typescript#latest
              env:
                  GH_TOKEN: ${{ github.token }}
              with:
                  steps: ${{ toJSON(steps) }}
                  script: |
                      const MARKER = "<!-- route-diff -->";
                      const BASE_START = "<!-- route-diff-base-routes";
                      const BASE_END = "route-diff-base-routes -->";
                      const PR_START = "<!-- route-diff-pr-routes";
                      const PR_END = "route-diff-pr-routes -->";

                      const prRoutes = Buffer.from(steps.routes.outputs.routes, "base64").toString();
                      const pr = context.issue.number;
                      const repo = { owner: context.repo.owner, repo: context.repo.repo };
                      const gh = octokit(env.GH_TOKEN || "");

                      function extractBlock(body: string, start: string, end: string): string {
                          const s = body.indexOf(start);
                          const e = body.indexOf(end);
                          if (s === -1 || e === -1) return "";
                          return body.slice(s + start.length + 1, e).trimEnd();
                      }

                      // Find existing route-diff comment
                      const comments = await gh.paginate(gh.rest.issues.listComments, { ...repo, issue_number: pr });
                      const existing = comments.filter((c: any) => c.body?.includes(MARKER)).pop();

                      let baseRoutes = "";

                      if (existing) {
                          const prevPR = extractBlock(existing.body!, PR_START, PR_END);
                          if (prevPR === prRoutes.trimEnd()) {
                              core.info("Routes unchanged since last comment");
                              process.exit(0);
                          }
                          baseRoutes = extractBlock(existing.body!, BASE_START, BASE_END);
                      }

                      if (!baseRoutes) {
                          const base = "${{ github.event.pull_request.base.sha }}";
                          await $`git fetch origin ${base} --depth=1`;
                          await $`git checkout -f ${base}`;
                          await $`rm -rf build/`;
                          try {
                              await $`go-toolchain --generate 52b76a04057b`;
                              const { stdout } = child_process.spawnSync(
                                  "./build/buildhost_linux_amd64", ["routes"], { encoding: "utf8" },
                              );
                              baseRoutes = stdout || "";
                          } catch {
                              baseRoutes = "";
                          }
                      }

                      if (baseRoutes.trimEnd() === prRoutes.trimEnd()) {
                          core.info("Routes match base branch");
                          if (existing) {
                              await gh.rest.issues.deleteComment({ ...repo, comment_id: existing.id });
                          }
                          process.exit(0);
                      }

                      const baseLines = baseRoutes.trimEnd().split("\n");
                      const prLines = prRoutes.trimEnd().split("\n");
                      const added = prLines.filter(l => !baseLines.includes(l));
                      const removed = baseLines.filter(l => !prLines.includes(l));

                      let diff = "";
                      for (const r of removed) diff += `-${r}\n`;
                      for (const a of added) diff += `+${a}\n`;

                      const body = [
                          MARKER,
                          BASE_START,
                          baseRoutes.trimEnd(),
                          BASE_END,
                          PR_START,
                          prRoutes.trimEnd(),
                          PR_END,
                          "### Route changes",
                          "",
                          "```diff",
                          diff.trimEnd(),
                          "```",
                          "",
                          "<details><summary>Full route list</summary>",
                          "",
                          "```",
                          prRoutes.trimEnd(),
                          "```",
                          "</details>",
                      ].join("\n");

                      if (existing) {
                          await gh.rest.issues.updateComment({ ...repo, comment_id: existing.id, body });
                      } else {
                          await gh.rest.issues.createComment({ ...repo, issue_number: pr, body });
                      }
