name: Container Image

on:
  push:
    branches: [master, claude/buildhost-container-image-yKEDL]

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: wow-look-at-my/actions@ghcr#latest
        with:
          push_image: ghcr.io/wow-look-at-my/buildhost:latest
