name: CI

on:
  push:

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: wow-look-at-my/go-toolchain@v1
        with:
          generate: c29114ff2f33
      - uses: actions/upload-artifact@v4
        with:
          name: buildhost-linux-amd64
          path: build/buildhost
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github/actions
      - uses: ./.github/actions/buildhost-publish
        with:
          server: https://pazer.build
          artifact_name: buildhost-linux-amd64
          artifact_file: buildhost
          os: linux
          arch: amd64

  container:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: buildhost-linux-amd64
          path: build
      - name: Log in to ghcr.io
        if: github.ref == 'refs/heads/master'
        run: echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"
          BUILD_ARGS="--build-arg VERSION=${GITHUB_SHA}"
          if [ "${GITHUB_REF}" = "refs/heads/master" ]; then
            docker buildx build ${BUILD_ARGS} --push -t "${IMAGE}:latest" .
          else
            docker buildx build ${BUILD_ARGS} .
          fi
