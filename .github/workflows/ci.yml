name: CI

on:
  push:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - uses: actions/cache@v4
        with:
          path: /tmp/go-toolchain-build
          key: go-toolchain-source-${{ runner.os }}-${{ runner.arch }}
      - name: Build go-toolchain from source
        run: |
          if [ ! -x /tmp/go-toolchain-build/go-toolchain ]; then
            git clone --depth 1 https://${PRIVATE_ORG_REPO_READ}@github.com/wow-look-at-my/go-toolchain.git /tmp/go-toolchain-src
            cd /tmp/go-toolchain-src
            mkdir -p /tmp/go-toolchain-build
            go build -o /tmp/go-toolchain-build/go-toolchain ./cmd/go-toolchain
          fi
      - uses: wow-look-at-my/go-toolchain@v1
        with:
          generate: c29114ff2f33
          binary: /tmp/go-toolchain-build/go-toolchain

  publish-ghcr:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: go-build
          path: build
      - name: Log in to ghcr.io
        if: github.ref == 'refs/heads/master'
        run: echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"
          BUILD_ARGS="--build-arg VERSION=${GITHUB_SHA}"
          if [ "${GITHUB_REF}" = "refs/heads/master" ]; then
            docker buildx build ${BUILD_ARGS} --push -t "${IMAGE}:latest" .
          else
            docker buildx build ${BUILD_ARGS} .
          fi

  publish-buildhost-test:
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github/actions
      - uses: ./.github/actions/buildhost-publish
