name: CI

on:
  push:

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: wow-look-at-my/go-toolchain@v1
        with:
          generate: c29114ff2f33
      - name: Publish to pazer.build
        if: github.ref == 'refs/heads/master'
        continue-on-error: true
        run: |
          TOKEN=$(curl -sf -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://pazer.build" | jq -r '.value')

          VERSION=$(curl -sf -X POST "https://pazer.build/api/v1/projects/buildhost/releases" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"git_branch\":\"${GITHUB_REF_NAME}\",\"git_commit\":\"${GITHUB_SHA}\"}" \
            | jq -r '.version')

          curl -sf -X PUT \
            "https://pazer.build/api/v1/projects/buildhost/releases/${VERSION}/artifacts/linux/amd64?kind=binary" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @build/buildhost

          curl -sf -X POST \
            "https://pazer.build/api/v1/projects/buildhost/releases/${VERSION}/publish" \
            -H "Authorization: Bearer ${TOKEN}"

          echo "Published buildhost ${VERSION} to pazer.build"

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to ghcr.io
        if: github.ref == 'refs/heads/master'
        run: echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"
          BUILD_ARGS="--build-arg VERSION=${GITHUB_SHA}"
          if [ "${GITHUB_REF}" = "refs/heads/master" ]; then
            docker buildx build ${BUILD_ARGS} --push -t "${IMAGE}:latest" .
          else
            docker buildx build ${BUILD_ARGS} .
          fi
