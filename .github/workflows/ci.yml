name: CI

on:
  push:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  packages: write
  # Required by the publish-ghcr reusable workflow (it verifies actions:read to
  # download build artifacts). A reusable workflow cannot be granted more than
  # the caller declares, so omitting this makes the whole run a startup_failure.
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: wow-look-at-my/go-toolchain@v1
        with:
          generate: 52b76a04057b
          autorelease: 'false'
      # On the default branch, cache this commit's route list keyed by its SHA.
      # Caches created on the default branch are restorable from every branch,
      # so feature-branch route-diff runs reuse this instead of rebuilding base.
      - if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        run: chmod +x build/buildhost_linux_amd64 && ./build/buildhost_linux_amd64 routes > routes.txt
      - if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        uses: actions/cache/save@v4
        with:
          path: routes.txt
          key: route-list-${{ github.sha }}

  route-diff:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      # id-token: write is needed by go-toolchain's secret-server step (used by
      # the cold-cache base build below); job-level permissions replace the
      # workflow-level block, so it must be repeated here.
      id-token: write
      contents: read
      pull-requests: write
    steps:
      # PR routes: from the artifact the build job already produced for this ref.
      - uses: actions/download-artifact@v4
        with:
          name: go-build
          path: build/
      - run: chmod +x build/buildhost_linux_amd64 && echo "routes=$(./build/buildhost_linux_amd64 routes | base64 -w0)" >> "$GITHUB_OUTPUT"
        id: routes
      # Base routes: prefer the route list the default-branch build cached
      # (keyed by the base commit SHA). Build base from source only on a cold
      # cache -- without a real baseline the diff reports every route as added.
      - id: base
        env:
          GH_TOKEN: ${{ github.token }}
        run: echo "sha=$(gh api repos/${{ github.repository }}/commits/${{ github.event.repository.default_branch }} --jq .sha)" >> "$GITHUB_OUTPUT"
      - id: cache
        uses: actions/cache/restore@v4
        with:
          path: base-routes.txt
          key: route-list-${{ steps.base.outputs.sha }}
      - if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.base.outputs.sha }}
          path: base
      - if: steps.cache.outputs.cache-hit != 'true'
        uses: wow-look-at-my/go-toolchain@v1
        with:
          working-directory: base
          # Same go:generate approval hash as the build job -- go-toolchain
          # refuses to run generate directives without it.
          generate: 52b76a04057b
          os: linux
          arch: amd64
          autorelease: 'false'
          upload-artifacts: 'false'
      - if: steps.cache.outputs.cache-hit != 'true'
        run: chmod +x base/build/buildhost_linux_amd64 && ./base/build/buildhost_linux_amd64 routes > base-routes.txt
      - if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: base-routes.txt
          key: route-list-${{ steps.base.outputs.sha }}
      - id: baseroutes
        run: echo "routes=$(base64 -w0 base-routes.txt)" >> "$GITHUB_OUTPUT"
      - uses: wow-look-at-my/actions@typescript#latest
        with:
          steps: ${{ toJSON(steps) }}
          script: |
              const prRoutes = Buffer.from(steps.routes.outputs.routes, "base64").toString().trimEnd();
              const baseRoutes = Buffer.from(steps.baseroutes.outputs.routes, "base64").toString().trimEnd();
              const gh = octokit("${{ github.token }}");
              const repo = { owner: context.repo.owner, repo: context.repo.repo };

              const prs = await gh.rest.pulls.list({ ...repo, head: `${repo.owner}:${context.ref.replace("refs/heads/", "")}`, state: "open" });
              if (prs.data.length === 0) {
                  core.info("No open PR for this branch");
                  process.exit(0);
              }
              const pr = prs.data[0].number;

              const marker = "<!-- route-diff -->";
              const comments = await gh.paginate(gh.rest.issues.listComments, { ...repo, issue_number: pr });
              const existing = comments.filter((c: any) => c.body?.includes("<!-- route-diff")).pop();

              if (baseRoutes === prRoutes) {
                  core.info("Routes match base branch");
                  if (existing) {
                      await gh.rest.issues.deleteComment({ ...repo, comment_id: existing.id });
                  }
                  process.exit(0);
              }

              fs.writeFileSync("/tmp/base-routes.txt", baseRoutes + "\n");
              fs.writeFileSync("/tmp/pr-routes.txt", prRoutes + "\n");
              const { stdout: diff } = child_process.spawnSync(
                  "diff", ["-u", "--label", "base", "--label", "pr", "/tmp/base-routes.txt", "/tmp/pr-routes.txt"],
                  { encoding: "utf8" },
              );

              const body = [
                  marker,
                  "### Route changes",
                  "",
                  "```diff",
                  diff.trimEnd(),
                  "```",
              ].join("\n");

              if (existing) {
                  await gh.rest.issues.updateComment({ ...repo, comment_id: existing.id, body });
              } else {
                  await gh.rest.issues.createComment({ ...repo, issue_number: pr, body });
              }

  container-healthcheck:
    needs: build
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: go-build
          path: build/
      - run: chmod +x build/buildhost_linux_amd64
      - run: docker compose -f docker-compose.ci.yml up -d --wait --wait-timeout 30
      - run: docker compose -f docker-compose.ci.yml logs
        if: failure()

  publish-ghcr:
    needs: container-healthcheck
    uses: wow-look-at-my/actions/.github/workflows/publish-ghcr.yml@master

  # Publish the admin dashboard's static frontend to the production buildhost as
  # a per-branch site (sites.<domain>/buildhost/branch/<slug>/). This replaces
  # the old GitHub Pages PR preview: each branch is an independent, atomically
  # replaced deployment, so there is no shared gh-pages branch to serialize on --
  # the concurrency contention that made "Deploy PR previews" flaky. Runs on
  # every push (no needs:), so a preview is published even if tests fail.
  # Authenticates with GitHub Actions OIDC (no static token); the workflow-level
  # id-token: write + contents: read are inherited here.
  publish-site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The sites serve route is /{project}/branch/{branch}/{path...}. With a
      # trailing wildcard the router gives {branch} a single path segment, so a
      # '/' in the branch name (e.g. claude/foo) would mis-route to branch
      # "claude". Slugify '/' -> '-' to keep the branch a single segment.
      - id: slug
        run: echo "branch=${GITHUB_REF_NAME//\//-}" >> "$GITHUB_OUTPUT"
      - uses: ./.github/actions/buildhost-publish-site
        with:
          branch: ${{ steps.slug.outputs.branch }}
          source_dir: ./internal/admin/static/
