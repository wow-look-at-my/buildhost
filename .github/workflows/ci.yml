name: CI

on:
  push:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  packages: write
  # Required by the publish-ghcr reusable workflow (it verifies actions:read to
  # download build artifacts). A reusable workflow cannot be granted more than
  # the caller declares, so omitting this makes the whole run a startup_failure.
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The CA bundle baked into the binary is fetched here, not committed (so the repo
      # carries no unreviewable cert blob). Must run before go-toolchain builds/embeds.
      - run: ./scripts/fetch-cacerts.sh
      - uses: wow-look-at-my/go-toolchain@v1
        with:
          generate: acf27fe87179
          autorelease: 'false'
      # On the default branch, cache this commit's route list keyed by its SHA.
      # Caches created on the default branch are restorable from every branch,
      # so feature-branch route-diff runs reuse this instead of rebuilding base.
      # The path MUST match route-diff's restore path: actions/cache derives the
      # cache version from the path, so a mismatched path is a guaranteed miss
      # even for an identical key.
      - if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        run: chmod +x build/buildhost_linux_amd64 && ./build/buildhost_linux_amd64 routes > base-routes.txt
      - if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        uses: actions/cache/save@v4
        with:
          path: base-routes.txt
          key: route-list-${{ github.sha }}

  route-diff:
    needs: build
    # Only meaningful on a branch that has an open PR to comment on. The default
    # branch has no PR to diff against, and its own route list is already cached
    # by the build job above -- running here would just rebuild the base from
    # source and throw the result away. Skip it.
    if: github.ref != format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    permissions:
      # id-token: write is needed by go-toolchain's secret-server step (used by
      # the cold-cache base build below); job-level permissions replace the
      # workflow-level block, so it must be repeated here.
      id-token: write
      contents: read
      pull-requests: write
    steps:
      # PR routes: from the artifact the build job already produced for this ref.
      - uses: actions/download-artifact@v4
        with:
          name: go-build
          path: build/
      - run: chmod +x build/buildhost_linux_amd64 && echo "routes=$(./build/buildhost_linux_amd64 routes | base64 -w0)" >> "$GITHUB_OUTPUT"
        id: routes
      # Base routes: prefer the route list the default-branch build cached
      # (keyed by the base commit SHA). Build base from source only on a cold
      # cache -- without a real baseline the diff reports every route as added.
      - id: base
        env:
          GH_TOKEN: ${{ github.token }}
        run: echo "sha=$(gh api repos/${{ github.repository }}/commits/${{ github.event.repository.default_branch }} --jq .sha)" >> "$GITHUB_OUTPUT"
      - id: cache
        uses: actions/cache/restore@v4
        with:
          path: base-routes.txt
          key: route-list-${{ steps.base.outputs.sha }}
      - if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.base.outputs.sha }}
          path: base
      # Base may post-date the CA-bundle change and embed it; fetch before building it.
      # Inlined (not the script) so it works even on base commits that predate the script.
      - if: steps.cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p base/internal/repackage/cacerts
          curl -fsSL --retry 3 --proto '=https' --tlsv1.2 -o base/internal/repackage/cacerts/ca-certificates.crt https://curl.se/ca/cacert.pem
      - if: steps.cache.outputs.cache-hit != 'true'
        uses: wow-look-at-my/go-toolchain@v1
        with:
          working-directory: base
          # Same go:generate approval hash as the build job -- go-toolchain
          # refuses to run generate directives without it.
          generate: acf27fe87179
          os: linux
          arch: amd64
          autorelease: 'false'
          upload-artifacts: 'false'
      - if: steps.cache.outputs.cache-hit != 'true'
        run: chmod +x base/build/buildhost_linux_amd64 && ./base/build/buildhost_linux_amd64 routes > base-routes.txt
      - if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: base-routes.txt
          key: route-list-${{ steps.base.outputs.sha }}
      - id: baseroutes
        run: echo "routes=$(base64 -w0 base-routes.txt)" >> "$GITHUB_OUTPUT"
      - uses: wow-look-at-my/actions@typescript#latest
        with:
          steps: ${{ toJSON(steps) }}
          script: |
              const prRoutes = Buffer.from(steps.routes.outputs.routes, "base64").toString().trimEnd();
              const baseRoutes = Buffer.from(steps.baseroutes.outputs.routes, "base64").toString().trimEnd();
              const gh = octokit("${{ github.token }}");
              const repo = { owner: context.repo.owner, repo: context.repo.repo };

              const prs = await gh.rest.pulls.list({ ...repo, head: `${repo.owner}:${context.ref.replace("refs/heads/", "")}`, state: "open" });
              if (prs.data.length === 0) {
                  core.info("No open PR for this branch");
                  process.exit(0);
              }
              const pr = prs.data[0].number;

              const marker = "<!-- route-diff -->";
              const comments = await gh.paginate(gh.rest.issues.listComments, { ...repo, issue_number: pr });
              const existing = comments.filter((c: any) => c.body?.includes("<!-- route-diff")).pop();

              if (baseRoutes === prRoutes) {
                  core.info("Routes match base branch");
                  if (existing) {
                      await gh.rest.issues.deleteComment({ ...repo, comment_id: existing.id });
                  }
                  process.exit(0);
              }

              fs.writeFileSync("/tmp/base-routes.txt", baseRoutes + "\n");
              fs.writeFileSync("/tmp/pr-routes.txt", prRoutes + "\n");
              const { stdout: diff } = child_process.spawnSync(
                  "diff", ["-u", "--label", "base", "--label", "pr", "/tmp/base-routes.txt", "/tmp/pr-routes.txt"],
                  { encoding: "utf8" },
              );

              const body = [
                  marker,
                  "### Route changes",
                  "",
                  "```diff",
                  diff.trimEnd(),
                  "```",
              ].join("\n");

              if (existing) {
                  await gh.rest.issues.updateComment({ ...repo, comment_id: existing.id, body });
              } else {
                  await gh.rest.issues.createComment({ ...repo, issue_number: pr, body });
              }

  container-healthcheck:
    # Only meaningful if the build succeeded and uploaded the go-build artifact. Without
    # this, an always()-style condition makes it run on build failure and then fail on the
    # missing artifact (a misleading second red X for one real failure).
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: go-build
          path: build/
      - run: chmod +x build/buildhost_linux_amd64
      # Build the image (and pull its base layers) in a separate, untimed step
      # so the --wait-timeout below budgets only container startup, not the
      # image build/pull. up then reuses this image instead of rebuilding.
      - run: docker compose -f docker-compose.ci.yml build
      - run: docker compose -f docker-compose.ci.yml up -d --wait --wait-timeout 30
      - run: docker compose -f docker-compose.ci.yml logs
        if: failure()

  # Prove an image buildhost SYNTHESIZES from a plain binary is a valid, loadable
  # container image whose baked-in CA bundle works for real outbound HTTPS. Uses crane
  # (go-containerregistry): it pulls/decompresses buildhost's zstd layers, which the
  # default GitHub Docker (no containerd image store) may not.
  synthesized-image-e2e:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: go-build
          path: build/
      - run: chmod +x build/buildhost_linux_amd64
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install crane (zstd-capable OCI client)
        run: go install github.com/google/go-containerregistry/cmd/crane@latest
      - name: Build netcheck entrypoint (static linux/amd64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o "$RUNNER_TEMP/netcheck" ./test/e2e/testdata/netcheck
      - name: Pull and run the synthesized OCI image
        run: PATH="$(go env GOPATH)/bin:$PATH" bash test/e2e/run.sh build/buildhost_linux_amd64 "$RUNNER_TEMP/netcheck"

  apt-install-e2e:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: go-build
          path: build/
      - run: chmod +x build/buildhost_linux_amd64
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build apt test package payload (static linux/amd64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o "$RUNNER_TEMP/buildhost-apt-e2e" ./test/e2e/testdata/netcheck
      - name: Install from the generated APT repository
        run: bash test/e2e/apt-install.sh build/buildhost_linux_amd64 "$RUNNER_TEMP/buildhost-apt-e2e"

  publish-ghcr:
    needs: container-healthcheck
    uses: wow-look-at-my/actions/.github/workflows/publish-ghcr.yml@master
