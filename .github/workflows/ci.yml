name: CI

on:
  push:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: wow-look-at-my/go-toolchain
          token: ${{ secrets.GITHUB_TOKEN }}
          path: /tmp/go-toolchain-src
      - uses: actions/setup-go@v5
        with:
          go-version-file: /tmp/go-toolchain-src/go.mod
          cache-dependency-path: /tmp/go-toolchain-src/go.sum
      - name: Build go-toolchain from source
        run: |
          cd /tmp/go-toolchain-src
          go build -o /tmp/go-toolchain ./src
      - uses: actions/checkout@v4
      - uses: wow-look-at-my/go-toolchain@v1
        with:
          generate: c29114ff2f33
          binary: /tmp/go-toolchain

  publish-ghcr:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: go-build
          path: build
      - name: Log in to ghcr.io
        if: github.ref == 'refs/heads/master'
        run: echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"
          BUILD_ARGS="--build-arg VERSION=${GITHUB_SHA}"
          if [ "${GITHUB_REF}" = "refs/heads/master" ]; then
            docker buildx build ${BUILD_ARGS} --push -t "${IMAGE}:latest" .
          else
            docker buildx build ${BUILD_ARGS} .
          fi

  publish-buildhost-test:
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github/actions
      - uses: ./.github/actions/buildhost-publish
