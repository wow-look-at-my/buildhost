name: Deploy PR previews

on:
    pull_request:
        types: [opened, reopened, synchronize]

# id-token: write lets buildhost-publish-site authenticate to buildhost via OIDC
# (no static secret); pull-requests is for the sticky preview comment.
permissions:
    contents: read
    pull-requests: write
    id-token: write

jobs:
    deploy-preview:
        # Pin to a released tag once pr-preview-action's buildhost workflow ships;
        # tracks the development branch for now.
        uses: PazerOP/pr-preview-action/.github/workflows/preview.yml@claude/hopeful-meitner-SUp2h
        with:
            source-dir: ./internal/admin/static/
        secrets: inherit
