name: Deploy PR previews

on:
    pull_request:
        types: [opened, reopened, synchronize]

# id-token: write lets buildhost-publish-site authenticate to buildhost via OIDC
# (no static secret); pull-requests is for the sticky preview comment.
permissions:
    contents: read
    actions: read
    pull-requests: write
    id-token: write

jobs:
    deploy-preview:
        uses: PazerOP/pr-preview-action/.github/workflows/preview.yml@master
        with:
            source-dir: ./internal/admin/static/
        secrets: inherit
