name: Buildhost - Get
description: Fetches a single resource from a Buildhost registry.

inputs:
  server:
    description: 'Buildhost server URL'
    required: true
  token:
    description: 'API token (required for private projects)'
    required: false
    default: ''
  resource:
    description: 'Resource type: project | release'
    required: true
  project:
    description: 'Project name'
    required: true
  version:
    description: 'Release version (required for resource=release)'
    required: false
    default: ''

outputs:
  response:
    description: 'JSON response from the API'
    value: ${{ steps.get.outputs.response }}
  id:
    description: 'Resource ID'
    value: ${{ steps.get.outputs.id }}

runs:
  using: composite
  steps:
    - id: get
      shell: bash
      env:
        SERVER: ${{ inputs.server }}
        TOKEN: ${{ inputs.token }}
        RESOURCE: ${{ inputs.resource }}
        PROJECT: ${{ inputs.project }}
        VERSION: ${{ inputs.version }}
      run: |
        case "$RESOURCE" in
          project)
            url="$SERVER/api/v1/projects/$PROJECT"
            label="Project: $PROJECT"
            ;;
          release)
            [ -z "$VERSION" ] && { echo "::error::version is required for resource=release"; exit 1; }
            url="$SERVER/api/v1/projects/$PROJECT/releases/$VERSION"
            label="Release: $PROJECT/$VERSION"
            ;;
          *)
            echo "::error::Unknown resource '$RESOURCE'. Valid values: project, release"
            exit 1
            ;;
        esac

        tmpfile=$(mktemp)
        status=$(curl -s -o "$tmpfile" -w '%{http_code}' "$url" \
          ${TOKEN:+-H "Authorization: Bearer $TOKEN"})
        response=$(cat "$tmpfile"); rm -f "$tmpfile"

        echo "$response" | jq .
        if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
          echo "::error::buildhost-get ($RESOURCE): HTTP $status: $response"
          exit 1
        fi
        echo "response=$(echo "$response" | jq -c .)" >> "$GITHUB_OUTPUT"
        echo "id=$(echo "$response" | jq -r '.id')" >> "$GITHUB_OUTPUT"
        {
          echo "## $label"
          echo '```json'
          echo "$response" | jq .
          echo '```'
        } >> "$GITHUB_STEP_SUMMARY"
