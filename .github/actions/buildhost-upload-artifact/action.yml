name: Buildhost - Upload Artifact
description: Uploads a binary artifact to a release in a Buildhost registry.

inputs:
  server:
    description: 'Buildhost server URL'
    required: true
  token:
    description: 'API token with write scope'
    required: true
  project:
    description: 'Project name'
    required: true
  version:
    description: 'Release version'
    required: true
  os:
    description: 'Target OS (linux, darwin, windows, freebsd)'
    required: true
  arch:
    description: 'Target arch (amd64, arm64, 386, arm)'
    required: true
  path:
    description: 'Path to the artifact file to upload'
    required: true
  kind:
    description: 'Artifact kind: binary, library, assets, archive'
    required: false
    default: 'binary'
  filename:
    description: 'Download filename hint (optional)'
    required: false
    default: ''

outputs:
  response:
    description: 'JSON response from the API'
    value: ${{ steps.upload.outputs.response }}
  sha256:
    description: 'SHA-256 digest of the uploaded artifact'
    value: ${{ steps.upload.outputs.sha256 }}

runs:
  using: composite
  steps:
    - id: upload
      shell: bash
      env:
        SERVER: ${{ inputs.server }}
        TOKEN: ${{ inputs.token }}
        PROJECT: ${{ inputs.project }}
        VERSION: ${{ inputs.version }}
        OS: ${{ inputs.os }}
        ARCH: ${{ inputs.arch }}
        KIND: ${{ inputs.kind }}
        ARTIFACT_PATH: ${{ inputs.path }}
        FILENAME: ${{ inputs.filename }}
      run: |
        extra_headers=()
        if [ -n "$FILENAME" ]; then
          extra_headers+=(-H "X-Artifact-Filename: $FILENAME")
        fi

        tmpfile=$(mktemp)
        status=$(curl -s -o "$tmpfile" -w '%{http_code}' \
          -X PUT "$SERVER/api/v1/projects/$PROJECT/releases/$VERSION/artifacts/$OS/$ARCH?kind=$KIND" \
          -H "Authorization: Bearer $TOKEN" \
          -H "Content-Type: application/octet-stream" \
          "${extra_headers[@]}" \
          --data-binary "@$ARTIFACT_PATH")
        response=$(cat "$tmpfile"); rm -f "$tmpfile"

        echo "$response" | jq .
        if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
          echo "::error::buildhost-upload-artifact: HTTP $status: $response"
          exit 1
        fi
        echo "response=$(echo "$response" | jq -c .)" >> "$GITHUB_OUTPUT"
        echo "sha256=$(echo "$response" | jq -r '.sha256')" >> "$GITHUB_OUTPUT"
        {
          echo "## Uploaded Artifact: $PROJECT/$VERSION ($OS/$ARCH)"
          echo '```json'
          echo "$response" | jq .
          echo '```'
        } >> "$GITHUB_STEP_SUMMARY"
