name: Publish to Buildhost
version: 1
description: Publish build artifacts to a buildhost registry using GHA OIDC. Understands go-toolchain matrix naming ({project}_{os}_{arch}).

inputs:
  server:
    description: 'Buildhost server URL (e.g., https://pazer.build)'
    required: true
  project:
    description: 'Project name on the buildhost instance (defaults to the repository name)'
    required: false
  artifact_name:
    description: 'GHA run artifact name to download (defaults to go-build from go-toolchain)'
    required: false
    default: 'go-build'
  version:
    description: 'Release version (omit for auto-versioned projects)'
    required: false
  git_branch:
    description: 'Git branch (defaults to GITHUB_REF_NAME)'
    required: false
  git_commit:
    description: 'Git commit SHA (defaults to GITHUB_SHA)'
    required: false

runs:
  using: composite
  steps:
    - uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.artifact_name }}
        path: /tmp/buildhost-publish

    - name: Publish to buildhost
      shell: bash
      env:
        INPUT_SERVER: ${{ inputs.server }}
        INPUT_PROJECT: ${{ inputs.project }}
        INPUT_VERSION: ${{ inputs.version }}
        INPUT_GIT_BRANCH: ${{ inputs.git_branch }}
        INPUT_GIT_COMMIT: ${{ inputs.git_commit }}
      run: |
        set -euo pipefail

        PROJECT="${INPUT_PROJECT:-${GITHUB_REPOSITORY#*/}}"
        GIT_BRANCH="${INPUT_GIT_BRANCH:-$GITHUB_REF_NAME}"
        GIT_COMMIT="${INPUT_GIT_COMMIT:-$GITHUB_SHA}"

        # Mint OIDC token
        TOKEN=$(curl -sf \
          -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
          "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${INPUT_SERVER}" | jq -r '.value')

        if [ -z "${TOKEN}" ] || [ "${TOKEN}" = "null" ]; then
          echo "::error::Failed to obtain OIDC token. Ensure the workflow has 'permissions: { id-token: write }'."
          exit 1
        fi

        # Discover matrix artifacts: {project}_{os}_{arch}
        ARTIFACTS=()
        for f in /tmp/buildhost-publish/*; do
          [ -f "$f" ] || continue
          [ -L "$f" ] && continue
          name=$(basename "$f")
          [[ "$name" == checksums.txt ]] && continue
          [[ "$name" == *.exe ]] && name="${name%.exe}"
          if [[ "$name" =~ ^${PROJECT}_([a-z]+)_([a-z0-9]+)$ ]]; then
            ARTIFACTS+=("$f:${BASH_REMATCH[1]}:${BASH_REMATCH[2]}")
          fi
        done

        if [ ${#ARTIFACTS[@]} -eq 0 ]; then
          echo "::error::No matrix artifacts matching '${PROJECT}_{os}_{arch}' found in artifact."
          ls -la /tmp/buildhost-publish/
          exit 1
        fi

        echo "Found ${#ARTIFACTS[@]} artifact(s) to publish"

        # Create release
        BODY=$(jq -n --arg b "${GIT_BRANCH}" --arg c "${GIT_COMMIT}" --arg v "${INPUT_VERSION}" \
          '{git_branch: $b, git_commit: $c} + (if $v != "" then {version: $v} else {} end)')

        HTTP_OUT=$(curl -s -w "\n%{http_code}" -X POST \
          "${INPUT_SERVER}/api/v1/projects/${PROJECT}/releases" \
          -H "Authorization: Bearer ${TOKEN}" \
          -H "Content-Type: application/json" \
          -d "${BODY}")

        HTTP_STATUS=$(echo "${HTTP_OUT}" | tail -1)
        HTTP_BODY=$(echo "${HTTP_OUT}" | sed '$d')

        if [ "${HTTP_STATUS}" = "201" ]; then
          VERSION=$(echo "${HTTP_BODY}" | jq -r '.version')
        elif [ "${HTTP_STATUS}" = "409" ]; then
          VERSION="${INPUT_VERSION}"
          if [ -z "${VERSION}" ]; then
            echo "::error::Release already exists and no explicit version was provided."
            exit 1
          fi
        else
          echo "::error::Failed to create release (HTTP ${HTTP_STATUS}): ${HTTP_BODY}"
          exit 1
        fi

        # Upload each artifact
        for entry in "${ARTIFACTS[@]}"; do
          IFS=: read -r filepath os arch <<< "${entry}"
          echo "Uploading ${os}/${arch}..."
          curl -sf -X PUT \
            "${INPUT_SERVER}/api/v1/projects/${PROJECT}/releases/${VERSION}/artifacts/${os}/${arch}?kind=binary" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"${filepath}"
        done

        # Publish release
        curl -sf -X POST \
          "${INPUT_SERVER}/api/v1/projects/${PROJECT}/releases/${VERSION}/publish" \
          -H "Authorization: Bearer ${TOKEN}"

        echo "Published ${PROJECT}/${VERSION} (${#ARTIFACTS[@]} artifacts) to ${INPUT_SERVER}"
