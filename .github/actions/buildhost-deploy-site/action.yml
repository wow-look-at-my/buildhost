name: Buildhost - Deploy Site
description: Deploys a static site directory to a Buildhost registry branch.

inputs:
  server:
    description: 'Buildhost server URL'
    required: true
  token:
    description: 'API token with write scope'
    required: true
  project:
    description: 'Project name'
    required: true
  branch:
    description: 'Deployment branch (e.g. main, staging, pr-42)'
    required: true
  source_dir:
    description: 'Directory to deploy'
    required: true
  git_commit:
    description: 'Git commit SHA (defaults to github.sha)'
    required: false
    default: ''

outputs:
  response:
    description: 'JSON response from the API'
    value: ${{ steps.deploy.outputs.response }}

runs:
  using: composite
  steps:
    - id: deploy
      uses: wow-look-at-my/actions@typescript#latest
      with:
        script: |
          await (async () => {
            const server: string = "${{ inputs.server }}";
            const token: string = "${{ inputs.token }}";
            const project: string = "${{ inputs.project }}";
            const branch: string = "${{ inputs.branch }}";
            const sourceDir: string = "${{ inputs.source_dir }}";
            const gitCommit: string = "${{ inputs.git_commit }}" || github.sha;

            const archive = path.join(os.tmpdir(), 'site.tar.gz');
            await exec.exec('tar', ['-czf', archive, '-C', sourceDir, '.']);
            const body = fs.readFileSync(archive);
            fs.unlinkSync(archive);
            core.info(`Archive size: ${body.length} bytes`);

            const headers: Record<string, string> = {
              'Authorization': `Bearer ${token}`,
              'Content-Type': 'application/gzip',
              'X-Git-Commit': gitCommit,
            };

            const resp = await fetch(`${server}/sites/${project}/branch/${branch}`, {
              method: 'PUT',
              headers,
              body,
            });
            const text = await resp.text();
            if (!resp.ok) { core.setFailed(`HTTP ${resp.status}: ${text}`); return; }

            core.info(JSON.stringify(JSON.parse(text), null, 2));
            core.setOutput('response', text);
          })();
