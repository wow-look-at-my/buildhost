name: Buildhost - Publish Release
description: Publishes a release (makes it immutable) in a Buildhost registry.

inputs:
  server:
    description: 'Buildhost server URL'
    required: true
  token:
    description: 'API token with write scope'
    required: true
  project:
    description: 'Project name'
    required: true
  version:
    description: 'Release version to publish'
    required: true

outputs:
  response:
    description: 'JSON response from the API'
    value: ${{ steps.publish.outputs.response }}

runs:
  using: composite
  steps:
    - id: publish
      uses: wow-look-at-my/actions@typescript#latest
      with:
        script: |
          await (async () => {
            const server: string = "${{ inputs.server }}";
            const token: string = "${{ inputs.token }}";
            const project: string = "${{ inputs.project }}";
            const version: string = "${{ inputs.version }}";

            const resp = await fetch(`${server}/api/v1/projects/${project}/releases/${version}/publish`, {
              method: 'POST',
              headers: { 'Authorization': `Bearer ${token}` },
            });
            const text = await resp.text();
            if (!resp.ok) { core.setFailed(`HTTP ${resp.status}: ${text}`); return; }

            core.info(JSON.stringify(JSON.parse(text), null, 2));
            core.setOutput('response', text);
          })();
