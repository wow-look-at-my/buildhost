name: Buildhost - Create Release
description: Creates a release for a project in a Buildhost registry.

inputs:
  server:
    description: 'Buildhost server URL'
    required: true
  token:
    description: 'API token with write scope'
    required: true
  project:
    description: 'Project name'
    required: true
  version:
    description: 'Version string (omit for auto-versioned projects)'
    required: false
    default: ''
  git_branch:
    description: 'Git branch (defaults to github.ref_name if empty)'
    required: false
    default: ''
  git_commit:
    description: 'Git commit SHA (defaults to github.sha if empty)'
    required: false
    default: ''
  notes:
    description: 'Release notes'
    required: false
    default: ''

outputs:
  response:
    description: 'JSON response from the API'
    value: ${{ steps.create.outputs.response }}
  version:
    description: 'Assigned release version'
    value: ${{ steps.create.outputs.version }}

runs:
  using: composite
  steps:
    - id: create
      shell: bash
      env:
        SERVER: ${{ inputs.server }}
        TOKEN: ${{ inputs.token }}
        PROJECT: ${{ inputs.project }}
        VERSION: ${{ inputs.version }}
        GIT_BRANCH: ${{ inputs.git_branch || github.ref_name }}
        GIT_COMMIT: ${{ inputs.git_commit || github.sha }}
        NOTES: ${{ inputs.notes }}
      run: |
        body=$(jq -n \
          --arg version "$VERSION" \
          --arg git_branch "$GIT_BRANCH" \
          --arg git_commit "$GIT_COMMIT" \
          --arg notes "$NOTES" \
          '{git_branch:$git_branch,git_commit:$git_commit,notes:$notes} +
           (if $version != "" then {version:$version} else {} end)')

        tmpfile=$(mktemp)
        status=$(curl -s -o "$tmpfile" -w '%{http_code}' \
          -X POST "$SERVER/api/v1/projects/$PROJECT/releases" \
          -H "Authorization: Bearer $TOKEN" \
          -H "Content-Type: application/json" \
          -d "$body")
        response=$(cat "$tmpfile"); rm -f "$tmpfile"

        echo "$response" | jq .
        if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
          echo "::error::buildhost-create-release: HTTP $status: $response"
          exit 1
        fi
        echo "response=$(echo "$response" | jq -c .)" >> "$GITHUB_OUTPUT"
        echo "version=$(echo "$response" | jq -r '.version')" >> "$GITHUB_OUTPUT"
        {
          echo "## Created Release: $PROJECT/$(echo "$response" | jq -r '.version')"
          echo '```json'
          echo "$response" | jq .
          echo '```'
        } >> "$GITHUB_STEP_SUMMARY"
