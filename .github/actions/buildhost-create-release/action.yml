name: Buildhost - Create Release
description: Creates a release for a project in a Buildhost registry.

inputs:
  server:
    description: 'Buildhost server URL'
    required: false
    default: 'https://pazer.build'
  token:
    description: 'API token with write scope, or omit to use OIDC'
    required: false
    default: ''
  project:
    description: 'Project name'
    required: true
  version:
    description: 'Version string (omit for auto-versioned projects)'
    required: false
    default: ''
  git_branch:
    description: 'Git branch (defaults to github.ref_name)'
    required: false
    default: ''
  git_commit:
    description: 'Git commit SHA (defaults to github.sha)'
    required: false
    default: ''
  notes:
    description: 'Release notes'
    required: false
    default: ''

outputs:
  response:
    description: 'JSON response from the API'
    value: ${{ steps.create.outputs.response }}
  version:
    description: 'Assigned release version'
    value: ${{ steps.create.outputs.version }}

runs:
  using: composite
  steps:
    - id: create
      uses: wow-look-at-my/actions@typescript#latest
      with:
        script: |
          await (async () => {
            const server: string = "${{ inputs.server }}";
            let token: string = "${{ inputs.token }}";
            if (!token) {
              const url = env.ACTIONS_ID_TOKEN_REQUEST_URL;
              const bearer = env.ACTIONS_ID_TOKEN_REQUEST_TOKEN;
              if (url && bearer) {
                const r = await fetch(`${url}&audience=${server}`, { headers: { Authorization: `Bearer ${bearer}` } });
                token = ((await r.json()) as { value: string }).value || '';
              }
            }
            const project: string = "${{ inputs.project }}";
            const version: string = "${{ inputs.version }}";
            const gitBranch: string = "${{ inputs.git_branch }}" || github.ref_name;
            const gitCommit: string = "${{ inputs.git_commit }}" || github.sha;

            const body: Record<string, string> = { git_branch: gitBranch, git_commit: gitCommit, notes: "${{ inputs.notes }}" };
            if (version) body['version'] = version;

            const resp = await fetch(`${server}/api/v1/projects/${project}/releases`, {
              method: 'POST',
              headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
              body: JSON.stringify(body),
            });
            const text = await resp.text();
            if (!resp.ok) { core.setFailed(`HTTP ${resp.status}: ${text}`); return; }

            const data = JSON.parse(text);
            core.info(JSON.stringify(data, null, 2));
            core.setOutput('response', text);
            core.setOutput('version', data.version);
          })();
