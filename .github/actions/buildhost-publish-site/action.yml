name: Buildhost - Publish Site
version: 1
description: Publish a static site to a Buildhost registry branch.

inputs:
  server:
    description: 'Buildhost server URL'
    required: false
    default: 'https://pazer.build'
  token:
    description: 'API token with write scope, or omit to use OIDC'
    required: false
    default: ''
  project:
    description: 'Project name (defaults to the repository name)'
    required: false
    default: ''
  branch:
    description: 'Branch name to publish the site under'
    required: true
  source_dir:
    description: 'Local directory to publish (mutually exclusive with artifact_name)'
    required: false
    default: ''
  artifact_name:
    description: 'GHA run artifact name to download and publish (mutually exclusive with source_dir)'
    required: false
    default: ''
  git_commit:
    description: 'Git commit SHA (defaults to github.sha)'
    required: false
    default: ''
  public:
    description: 'Serve the site publicly even when the source repo/project is private. The project itself (and any release artifacts) stays private; only this site branch is opened.'
    required: false
    default: 'false'

outputs:
  response:
    description: 'JSON response from the API'
    value: ${{ steps.publish.outputs.response }}
  site_url:
    description: 'URL of the published site'
    value: ${{ steps.publish.outputs.site_url }}

runs:
  using: composite
  steps:
    - id: publish
      uses: wow-look-at-my/actions@typescript#latest
      env:
        GITHUB_TOKEN: ${{ github.token }}
      with:
        script: |
          await (async () => {
            const server: string = "${{ inputs.server }}";
            const sourceDir: string = "${{ inputs.source_dir }}";
            const artifactName: string = "${{ inputs.artifact_name }}";

            if (sourceDir && artifactName) {
              core.setFailed('Specify source_dir or artifact_name, not both'); return;
            }
            if (!sourceDir && !artifactName) {
              core.setFailed('Either source_dir or artifact_name is required'); return;
            }

            // Route inputs through string-typed locals before `||`. A bare
            // input literal substituted directly into `x || y` is statically
            // empty-or-not, which the typescript action rejects (TS2872/TS2873).
            const projectInput: string = "${{ inputs.project }}";
            const project: string = projectInput || github.repository.split('/').pop()!;
            const branch: string = "${{ inputs.branch }}";
            const gitCommitInput: string = "${{ inputs.git_commit }}";
            const gitCommit: string = gitCommitInput || github.sha;
            // Opt-in public flag. buildhost serves a site published with
            // X-Public-Site: true without a token even under a private project.
            const publicInput: string = "${{ inputs.public }}";
            const isPublic: string = publicInput === 'true' ? 'true' : 'false';

            // buildhost serves each service on its own subdomain and dispatches
            // by the first Host label, so the sites endpoint is sites.<domain>.
            const su = new URL(server);
            const sitesBase = `${su.protocol}//sites.${su.host}`;

            let token: string = "${{ inputs.token }}";
            if (!token) {
              const url = env.ACTIONS_ID_TOKEN_REQUEST_URL;
              const bearer = env.ACTIONS_ID_TOKEN_REQUEST_TOKEN;
              if (url && bearer) {
                const r = await fetch(`${url}&audience=${server}`, { headers: { Authorization: `Bearer ${bearer}` } });
                token = ((await r.json()) as { value: string }).value || '';
              }
            }

            let body: Buffer;
            let contentType: string;
            if (artifactName) {
              const oct = octokit(process.env.GITHUB_TOKEN!);
              const [owner, repo] = github.repository.split('/');
              const { data: { artifacts } } = await oct.rest.actions.listWorkflowRunArtifacts({ owner, repo, run_id: github.run_id });
              const artifact = artifacts.find((a: any) => a.name === artifactName);
              if (!artifact) { core.setFailed(`Artifact '${artifactName}' not found in run`); return; }
              const { data: zip } = await oct.rest.actions.downloadArtifact({ owner, repo, artifact_id: artifact.id, archive_format: 'zip' });
              body = Buffer.from(zip as ArrayBuffer);
              contentType = 'application/zip';
            } else {
              const tarPath = path.join(os.tmpdir(), 'site.tar.gz');
              await exec.exec('tar', ['-czf', tarPath, '-C', sourceDir, '.']);
              body = fs.readFileSync(tarPath);
              fs.unlinkSync(tarPath);
              contentType = 'application/gzip';
            }
            core.info(`Archive size: ${body.length} bytes`);

            const resp = await fetch(`${sitesBase}/${project}/branch/${branch}`, {
              method: 'PUT',
              headers: {
                Authorization: `Bearer ${token}`,
                'Content-Type': contentType,
                'X-Git-Commit': gitCommit,
                'X-Public-Site': isPublic,
              },
              body,
            });
            const text = await resp.text();
            if (!resp.ok) { core.setFailed(`HTTP ${resp.status}: ${text}`); return; }

            const siteURL = `${sitesBase}/${project}/branch/${branch}/`;
            core.info(`Published site to ${siteURL}`);
            core.info(JSON.stringify(JSON.parse(text), null, 2));
            core.setOutput('response', text);
            core.setOutput('site_url', siteURL);
          })();
