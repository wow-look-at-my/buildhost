name: Buildhost - Publish Site
version: 1
description: Publish a static site to a Buildhost registry branch and (optionally) register a matching GitHub deployment.

inputs:
  server:
    description: 'Buildhost server URL (apex; the sites subdomain is derived from it)'
    required: false
    default: 'https://pazer.build'
  token:
    description: 'API token with write scope, or omit to use OIDC'
    required: false
    default: ''
  project:
    description: 'Project name (defaults to the repository name)'
    required: false
    default: ''
  branch:
    description: 'Branch name to publish the site under'
    required: true
  source_dir:
    description: 'Local directory to publish (mutually exclusive with artifact_name)'
    required: false
    default: ''
  artifact_name:
    description: 'GHA run artifact name to download and publish (mutually exclusive with source_dir)'
    required: false
    default: ''
  git_commit:
    description: 'Git commit SHA (defaults to github.sha)'
    required: false
    default: ''
  register_deployment:
    description: 'Register a GitHub deployment + status pointing at the served site URL so the PR Deployments widget and Environments tab populate. Requires deployments:write on the calling job. Set to "false" to skip.'
    required: false
    default: 'true'
  environment:
    description: 'GitHub deployment environment name. Defaults to the branch; the repo default branch is marked production, other branches transient previews.'
    required: false
    default: ''

outputs:
  response:
    description: 'JSON response from the API'
    value: ${{ steps.publish.outputs.response }}
  site_url:
    description: 'URL of the published site'
    value: ${{ steps.publish.outputs.site_url }}

runs:
  using: composite
  steps:
    - id: publish
      uses: wow-look-at-my/actions@typescript#latest
      env:
        GITHUB_TOKEN: ${{ github.token }}
      with:
        script: |
          await (async () => {
            const server: string = ("${{ inputs.server }}").replace(/\/+$/, "");
            const sourceDir: string = "${{ inputs.source_dir }}";
            const artifactName: string = "${{ inputs.artifact_name }}";
            const projectInput: string = "${{ inputs.project }}";
            const branch: string = "${{ inputs.branch }}";
            const gitCommitInput: string = "${{ inputs.git_commit }}";
            const tokenInput: string = "${{ inputs.token }}";
            const registerInput: string = "${{ inputs.register_deployment }}";
            const environmentInput: string = "${{ inputs.environment }}";

            if (sourceDir && artifactName) {
              core.setFailed('Specify source_dir or artifact_name, not both'); return;
            }
            if (!sourceDir && !artifactName) {
              core.setFailed('Either source_dir or artifact_name is required'); return;
            }

            // Intermediate string-typed locals so the `|| fallback` below stays a
            // string operand (a substituted literal here trips tsc TS2872/TS2873).
            const project: string = projectInput || github.repository.split('/').pop();
            const gitCommit: string = gitCommitInput || github.sha;

            let token: string = tokenInput;
            if (!token) {
              const url = env.ACTIONS_ID_TOKEN_REQUEST_URL;
              const bearer = env.ACTIONS_ID_TOKEN_REQUEST_TOKEN;
              if (url && bearer) {
                const r = await fetch(`${url}&audience=${server}`, { headers: { Authorization: `Bearer ${bearer}` } });
                token = ((await r.json()) as { value: string }).value || '';
              }
            }

            let siteDir: string;
            if (artifactName) {
              const downloadDir = path.join(os.tmpdir(), 'buildhost-site');
              fs.mkdirSync(downloadDir, { recursive: true });
              const [owner, repo] = github.repository.split('/');
              const { data: { artifacts } } = await octokit.rest.actions.listWorkflowRunArtifacts({ owner, repo, run_id: github.run_id });
              const artifact = artifacts.find((a: any) => a.name === artifactName);
              if (!artifact) { core.setFailed(`Artifact '${artifactName}' not found in run`); return; }
              const { data: zip } = await octokit.rest.actions.downloadArtifact({ owner, repo, artifact_id: artifact.id, archive_format: 'zip' });
              const zipPath = path.join(downloadDir, 'site.zip');
              fs.writeFileSync(zipPath, Buffer.from(zip as ArrayBuffer));
              siteDir = path.join(downloadDir, 'extracted');
              fs.mkdirSync(siteDir, { recursive: true });
              await exec.exec('unzip', ['-o', zipPath, '-d', siteDir]);
            } else {
              siteDir = sourceDir;
            }

            const tarPath = path.join(os.tmpdir(), 'site.tar.gz');
            await exec.exec('tar', ['-czf', tarPath, '-C', siteDir, '.']);
            const body = fs.readFileSync(tarPath);
            fs.unlinkSync(tarPath);
            core.info(`Archive size: ${body.length} bytes`);

            // buildhost dispatches each service by Host subdomain, so static sites
            // live at sites.<host>/<project>/branch/<branch> -- not a /sites/ path
            // on the apex (that path 404s in production).
            const sitesBase: string = server.replace('://', '://sites.');
            const putURL: string = `${sitesBase}/${project}/branch/${branch}`;
            const siteURL: string = `${putURL}/`;

            const resp = await fetch(putURL, {
              method: 'PUT',
              headers: {
                Authorization: `Bearer ${token}`,
                'Content-Type': 'application/gzip',
                'X-Git-Commit': gitCommit,
              },
              body,
            });
            const text = await resp.text();
            if (!resp.ok) { core.setFailed(`HTTP ${resp.status}: ${text}`); return; }

            core.info(`Published site to ${siteURL}`);
            core.info(JSON.stringify(JSON.parse(text), null, 2));
            core.setOutput('response', text);
            core.setOutput('site_url', siteURL);

            // Register a GitHub deployment so the PR's Deployments widget and the
            // Environments tab show this buildhost URL -- the same surface GitHub
            // Pages populates automatically. Needs deployments:write on the caller;
            // any failure here is a warning and never fails the publish.
            const registerDeployment: boolean = registerInput !== 'false';
            if (registerDeployment) {
              try {
                const [owner, repo] = github.repository.split('/');
                let defaultBranch: string = '';
                try { defaultBranch = (context.payload as any)?.repository?.default_branch || ''; } catch { /* not present on this event */ }
                const isProduction: boolean = defaultBranch !== '' && branch === defaultBranch;
                const environment: string = environmentInput || branch;
                const logURL: string = `${github.server_url}/${owner}/${repo}/actions/runs/${github.run_id}`;

                const dep = await octokit.rest.repos.createDeployment({
                  owner, repo,
                  ref: gitCommit,
                  environment,
                  required_contexts: [],
                  auto_merge: false,
                  transient_environment: !isProduction,
                  production_environment: isProduction,
                  description: `buildhost site for ${project} (${branch})`,
                });

                if (dep && dep.data && typeof dep.data.id === 'number') {
                  await octokit.rest.repos.createDeploymentStatus({
                    owner, repo,
                    deployment_id: dep.data.id,
                    state: 'success',
                    environment,
                    environment_url: siteURL,
                    log_url: logURL,
                    description: 'Published to buildhost',
                  });
                  core.info(`Registered GitHub deployment '${environment}' -> ${siteURL}`);
                } else {
                  core.warning(`Deployment API returned no id: ${JSON.stringify(dep && dep.data)}`);
                }
              } catch (e: any) {
                core.warning(`Could not register GitHub deployment (does the calling job grant 'deployments: write'?): ${e && e.message ? e.message : e}`);
              }
            }
          })();
