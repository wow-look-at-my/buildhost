name: Buildhost - Delete
description: Deletes a resource from a Buildhost registry.

inputs:
  server:
    description: 'Buildhost server URL'
    required: false
    default: 'https://pazer.build'
  token:
    description: 'API token with write scope, or omit to use OIDC'
    required: false
    default: ''
  resource:
    description: 'Resource type: token | oidc-policy | site'
    required: true
  id:
    description: 'Numeric ID of the resource (required for: token, oidc-policy)'
    required: false
    default: ''
  project:
    description: 'Project name (required for: site)'
    required: false
    default: ''
  branch:
    description: 'Branch name (required for: site)'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - uses: wow-look-at-my/actions@typescript#latest
      with:
        script: |
          await (async () => {
            const server: string = "${{ inputs.server }}";
            let token: string = "${{ inputs.token }}";
            if (!token) {
              const url = env.ACTIONS_ID_TOKEN_REQUEST_URL;
              const bearer = env.ACTIONS_ID_TOKEN_REQUEST_TOKEN;
              if (url && bearer) {
                const r = await fetch(`${url}&audience=${server}`, { headers: { Authorization: `Bearer ${bearer}` } });
                token = ((await r.json()) as { value: string }).value || '';
              }
            }
            const resource: string = "${{ inputs.resource }}";
            const id: string = "${{ inputs.id }}";
            const project: string = "${{ inputs.project }}";
            const branch: string = "${{ inputs.branch }}";

            let url: string;
            switch (resource) {
              case 'token':
                if (!id) { core.setFailed('id is required for resource=token'); return; }
                url = `${server}/api/v1/tokens/${id}`;
                break;
              case 'oidc-policy':
                if (!id) { core.setFailed('id is required for resource=oidc-policy'); return; }
                url = `${server}/api/v1/oidc/policies/${id}`;
                break;
              case 'site': {
                if (!project) { core.setFailed('project is required for resource=site'); return; }
                if (!branch)  { core.setFailed('branch is required for resource=site'); return; }
                // Sites are served on the sites.<domain> subdomain.
                const su = new URL(server);
                url = `${su.protocol}//sites.${su.host}/${project}/branch/${branch}`;
                break;
              }
              default:
                core.setFailed(`Unknown resource '${resource}'. Valid: token, oidc-policy, site`);
                return;
            }

            const resp = await fetch(url, {
              method: 'DELETE',
              headers: { 'Authorization': `Bearer ${token}` },
            });
            if (!resp.ok) {
              core.setFailed(`HTTP ${resp.status}: ${await resp.text()}`);
              return;
            }
            core.info(`Deleted ${resource} ${id || `${project}/${branch}`}`);
          })();
