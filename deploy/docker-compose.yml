services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    networks:
      - internal
    restart: unless-stopped

  proxy:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - internal
    restart: unless-stopped

  buildhost:
    image: ghcr.io/wow-look-at-my/buildhost:latest
    labels:
      docker-updater.enable: "true"
      docker-updater.rolling: "true"
    stop_grace_period: 5m
    volumes:
      - buildhost-data:/var/lib/buildhost
    environment:
      - BUILDHOST_BASE_URL=${BUILDHOST_BASE_URL}
    networks:
      internal:
        aliases:
          - buildhost-backend
    restart: unless-stopped

  docker-updater:
    image: ghcr.io/wow-look-at-my/docker-updater
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

volumes:
  buildhost-data:

networks:
  internal:
